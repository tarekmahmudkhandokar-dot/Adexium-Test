<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App Ads</title>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
      window.TelegramAdsController = new TelegramAdsController();
      window.TelegramAdsController.initialize({
        pubId: "987925",
        appId: "5127",
      });
    </script>
    
    <script type="text/javascript" src="https://cdn.tgads.space/assets/js/adexium-widget.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            transition: transform 0.2s;
        }
        #interstitial-btn {
            background-color: #0088cc; /* Telegram blue */
        }
        #push-btn {
            background-color: #28a745; /* Success green */
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h2>Ad Integration Test</h2>

    <div class="btn-container">
        <button id="interstitial-btn">Show Interstitial Ad</button>
        <button id="push-btn">Show Push-like Ad</button>
    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', () => {
            
            // Adexium বাটন সেটআপ (আগের মতোই রাখা)
            const interstitialBtn = document.getElementById('interstitial-btn');
            interstitialBtn.addEventListener('click', () => {
                const interstitialAd = new AdexiumWidget({
                    wid: '994b631c-6659-4975-a09b-9bb3b4eb0290', 
                    adFormat: 'interstitial'
                });
                interstitialAd.autoMode();
                console.log("Interstitial Ad triggered (Adexium)");
            });

            const pushBtn = document.getElementById('push-btn');
            pushBtn.addEventListener('click', () => {
                const pushAd = new AdexiumWidget({
                    wid: '1b6359f2-c461-498c-915e-3dfbe0eaa3c1', 
                    adFormat: 'push-like'
                });
                pushAd.autoMode();
                console.log("Push-like Ad triggered (Adexium)");
            });

            // RichAds অটো অ্যাডের চেষ্টা (৫ সেকেন্ড পর প্রথম + প্রতি ১ মিনিট পর)
            setTimeout(() => {
                console.log("RichAds auto attempt started after 5 seconds");

                // প্রথম re-initialize চেষ্টা
                if (window.TelegramAdsController) {
                    window.TelegramAdsController = new TelegramAdsController();
                    window.TelegramAdsController.initialize({
                        pubId: "987925",
                        appId: "5127"
                    });
                    console.log("RichAds re-initialized (first attempt)");
                }

                // প্রতি ৬০ সেকেন্ড পর পর re-init
                setInterval(() => {
                    console.log("RichAds auto cycle: re-initializing...");
                    if (window.TelegramAdsController) {
                        window.TelegramAdsController = new TelegramAdsController();
                        window.TelegramAdsController.initialize({
                            pubId: "987925",
                            appId: "5127"
                        });
                    }
                }, 60000);

            }, 5000);
        });
    </script>

</body>
</html>
