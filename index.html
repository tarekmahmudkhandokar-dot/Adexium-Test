<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App Ads</title>

    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>

    <!-- RichAds (ONLY ONCE) -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
      window.TelegramAdsController = new TelegramAdsController();
      window.TelegramAdsController.initialize({
        pubId: "987925",
        appId: "5127"   // একটাই ব্যবহার করো
      });
    </script>

    <!-- Adexium Script -->
    <script src="https://cdn.tgads.space/assets/js/adexium-widget.min.js"></script>

    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f0f2f5;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            color: white;
        }
        #interstitial-btn { background: #0088cc; }
        #push-btn { background: #28a745; }
    </style>
</head>

<body>

<h2>Ad Integration Test</h2>

<button id="interstitial-btn">Show Interstitial Ad</button>
<button id="push-btn">Show Push Ad</button>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // 🔥 Auto Ad (IMPORTANT - page load test)
    const autoAd = new AdexiumWidget({
        wid: '994b631c-6659-4975-a09b-9bb3b4eb0290',
        adFormat: 'interstitial'
    });
    autoAd.autoMode();

    // Interstitial Button
    document.getElementById('interstitial-btn').onclick = () => {
        const ad = new AdexiumWidget({
            wid: '994b631c-6659-4975-a09b-9bb3b4eb0290',
            adFormat: 'interstitial'
        });
        ad.autoMode();
        console.log("Interstitial Ad Clicked");
    };

    // Push Button
    document.getElementById('push-btn').onclick = () => {
        const ad = new AdexiumWidget({
            wid: '1b6359f2-c461-498c-915e-3dfbe0eaa3c1',
            adFormat: 'push-like'
        });
        ad.autoMode();
        console.log("Push Ad Clicked");
    };

});
</script>

</body>
</html>
