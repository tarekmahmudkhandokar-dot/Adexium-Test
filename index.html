<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App Ads</title>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>

<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
          <script>
            window.TelegramAdsController = new TelegramAdsController();
            window.TelegramAdsController.initialize({
              pubId: "987925",
              appId: "5127",
            });
          </script>
    
    <script type="text/javascript" src="https://cdn.tgads.space/assets/js/adexium-widget.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            transition: transform 0.2s;
        }
        #interstitial-btn {
            background-color: #0088cc; /* Telegram blue */
        }
        #push-btn {
            background-color: #28a745; /* Success green */
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h2>Ad Integration Test</h2>

    <div class="btn-container">
        <button id="interstitial-btn">Show Interstitial Ad</button>

        <button id="push-btn">Show Push-like Ad</button>
    </div>

    <script type="text/javascript">
        // পেজ লোড হওয়ার পর বাটনগুলোতে ফাংশন সেট করা
        document.addEventListener('DOMContentLoaded', () => {
            
            // ইন্টারস্টিশিয়াল অ্যাড সেটআপ
            const interstitialBtn = document.getElementById('interstitial-btn');
            interstitialBtn.addEventListener('click', () => {
                const interstitialAd = new AdexiumWidget({
                    wid: '994b631c-6659-4975-a09b-9bb3b4eb0290', 
                    adFormat: 'interstitial'
                });
                interstitialAd.autoMode(); // ক্লিক করলে অ্যাড দেখাবে
                console.log("Interstitial Ad triggered");
            });

            // পুশ-লাইক অ্যাড সেটআপ
            const pushBtn = document.getElementById('push-btn');
            pushBtn.addEventListener('click', () => {
                const pushAd = new AdexiumWidget({
                    wid: '1b6359f2-c461-498c-915e-3dfbe0eaa3c1', 
                    adFormat: 'push-like'
                });
                pushAd.autoMode(); // ক্লিক করলে অ্যাড দেখাবে
                console.log("Push-like Ad triggered");
            });

        });
    </script>
<script type="text/javascript">
  document.addEventListener('DOMContentLoaded', () => {
    // তোমার আগের বাটন কোডগুলো এখানে থাকবে...

    // ---------------- অটো অ্যাডের জন্য ----------------
    setTimeout(() => {
      // প্রথম অ্যাড: ৫ সেকেন্ড পর (RichAds auto + Adexium trigger)
      console.log("First auto ad attempt after 5 seconds");

      // RichAds: re-initialize attempt (কখনো কখনো trigger করে)
      if (window.TelegramAdsController) {
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
          pubId: "987925",
          appId: "5127"
        });
      }

      // Adexium interstitial অটো ট্রিগার
      try {
        const autoInterstitial = new AdexiumWidget({
          wid: '994b631c-6659-4975-a09b-9bb3b4eb0290',
          adFormat: 'interstitial'
        });
        autoInterstitial.autoMode();
        console.log("Auto Adexium interstitial triggered");
      } catch (e) {
        console.error("Adexium auto error:", e);
      }

      // প্রতি ১ মিনিট পর পর (60000 ms)
      setInterval(() => {
        console.log("Auto ad cycle every 60 seconds");

        // RichAds re-init
        if (window.TelegramAdsController) {
          window.TelegramAdsController = new TelegramAdsController();
          window.TelegramAdsController.initialize({
            pubId: "987925",
            appId: "5127"
          });
        }

        // Adexium push-like অটো ট্রিগার (অথবা interstitial)
        try {
          const autoPush = new AdexiumWidget({
            wid: '1b6359f2-c461-498c-915e-3dfbe0eaa3c1',
            adFormat: 'push-like'
          });
          autoPush.autoMode();
          console.log("Auto Adexium push-like triggered");
        } catch (e) {
          console.error("Adexium auto push error:", e);
        }

      }, 60000);

    }, 5000);
  });
</script>
</body>
</html>
